image_quality_gate:
  blur:
    method: laplacian_variance
    # Laplacian variance: semakin kecil = semakin blur.
    # 100.0 adalah batas minimum yang wajar untuk foto lapangan via smartphone.
    # Turunkan ke 75.0 jika terlalu banyak false-reject di kondisi gelap/backlit.
    threshold: 100.0
    unit: variance_score
    reject_reason: "Gambar terlalu blur, pastikan kamera stabil saat memotret"

  brightness:
    method: mean_pixel_value
    # Range 40–220 menoleransi kondisi mendung hingga cerah.
    # min=40 mencegah gambar terlalu gelap (malam/tertutup), max=220 mencegah overexpose.
    min: 80
    max: 200
    unit: pixel_value_0_255
    reject_reason_dark: "Gambar terlalu gelap, pastikan pencahayaan cukup"
    reject_reason_over: "Gambar terlalu terang (overexposed), hindari cahaya langsung ke lensa"

  occlusion:
    method: near_black_pixel_ratio
    # Piksel dianggap "hampir hitam" jika nilai grayscale-nya < 15
    near_black_value: 15
    # Tolak jika > 85% piksel hampir hitam → lensa tertutup/terhalang
    threshold: 0.85
    unit: ratio_0_to_1
    reject_reason: "Lensa kamera tertutup atau terhalang, bersihkan lensa dan coba lagi"

rule_engine:
  pole:
    confidence:
      # Pole adalah objek utama — threshold 0.80 cukup ketat, sesuai untuk objek besar
      min_score: 0.80
      reject_reason: "Objek tiang (pole) tidak terdeteksi dengan jelas"

    tilt:
      method: mask_min_area_rect_angle
      # 5° cukup ketat untuk standar pemasangan tiang tegak.
      # Catatan: sudut perspektif kamera juga bisa menambah apparent tilt ~2-3°.
      # Pertimbangkan naikkan ke 7° jika banyak false-reject akibat sudut foto.
      max_degrees: 5.0
      unit: degrees
      reject_reason: "Tiang miring melebihi batas ({value}°), batas maksimal 5°"

    frame_coverage:
      method: mask_area_ratio
      # 1.2% dari area frame — tiang yang cukup besar untuk dinilai kualitasnya
      min_coverage: 0.012
      unit: ratio_0_to_1
      reject_reason: "Area tiang terlalu kecil dalam frame, mundur dan ambil gambar keseluruhan tiang"

    foundation_visibility:
      method: require_class
      required_class: pole_base
      reject_reason: "Fondasi tiang (pole_base) tidak terlihat, turunkan sudut kamera"

  odp_box:
    confidence:
      # ODP box lebih kecil dari tiang, threshold lebih rendah wajar
      min_score: 0.70
      reject_reason: "Objek ODP (odp_box) tidak terdeteksi dengan jelas"

    tilt:
      method: mask_min_area_rect_angle
      # ODP box boleh sedikit miring hingga 8° karena faktor pemasangan & sudut foto
      max_degrees: 8.0
      unit: degrees
      reject_reason: "ODP miring melebihi batas ({value}°), batas maksimal 8°"

    frame_coverage:
      method: mask_area_ratio
      # 0.5% — ODP box lebih kecil, threshold lebih rendah dari pole
      min_coverage: 0.005
      unit: ratio_0_to_1
      reject_reason: "ODP terlalu kecil dalam frame, ambil gambar dari jarak lebih dekat"

    identifier:
      method: require_class
      required_class: odp_identifier
      reject_reason: "Identitas ODP (odp_identifier) tidak terdeteksi"

    door_closed:
      method: require_class
      required_class: odp_door
      reject_reason: "Pintu ODP (odp_door) tidak terdeteksi"

    cable:
      method: require_class
      required_class: odp_cable
      reject_reason: "Kabel ODP (odp_cable) tidak terdeteksi"

  pole_and_odp_box:
    confidence:
      # Threshold lebih rendah (0.65) karena dua objek harus muat dalam satu frame
      # → objek bisa lebih kecil/jauh dari foto single-object
      min_score_each: 0.65
      reject_reason: "Salah satu objek utama tidak terdeteksi: {missing_object}"

    both_detected:
      required: true
      reject_reason: "Hanya {detected_object} yang terdeteksi, pastikan Pole dan ODP Box keduanya masuk frame"

    # PENTING: Nilai di bawah ini HARUS konsisten dengan section pole.tilt dan odp_box.tilt di atas.
    # Jika kamu mengubah threshold di section pole atau odp_box, update juga di sini.
    pole_tilt:
      method: mask_min_area_rect_angle
      max_degrees: 5.0 # Sama dengan pole.tilt.max_degrees
      unit: degrees
      reject_reason: "Tiang miring melebihi batas ({value}°), batas maksimal 5°"

    odp_box_tilt:
      method: mask_min_area_rect_angle
      max_degrees: 8.0 # Sama dengan odp_box.tilt.max_degrees
      unit: degrees
      reject_reason: "ODP miring melebihi batas ({value}°), batas maksimal 8°"

    frame_coverage:
      method: combined_mask_area_ratio
      # Combined: pole (min 1.2%) + odp_box (min 0.5%) = wajarnya > 1.5%
      # Tapi jika foto dari jauh (keduanya kecil), mungkin perlu turun ke 0.01
      min_coverage: 0.015
      unit: ratio_0_to_1
      reject_reason: "Tiang dan ODP tidak cukup terlihat secara proporsional dalam frame"

    foundation_visibility:
      method: require_class
      required_class: pole_base
      reject_reason: "Fondasi tiang (pole_base) tidak terlihat, turunkan sudut kamera"

    location_description:
      method: require_class
      required_class: loc_desc
      reject_reason: "Deskripsi lokasi (loc_desc) tidak ditemukan pada gambar"
