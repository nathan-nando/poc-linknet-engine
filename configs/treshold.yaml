image_quality_gate:
  orientation:
    expected: "portrait"
    reject_reason: "Orientasi gambar salah, pastikan mengambil gambar dalam posisi portrait (berdiri)."

  blur:
    threshold: 100.0
    reject_reason: "Gambar terlalu blur, pastikan kamera stabil saat memotret"

  brightness:
    min: 80
    max: 200
    reject_reason_dark: "Gambar terlalu gelap, pastikan pencahayaan cukup"
    reject_reason_over: "Gambar terlalu terang (overexposed), hindari cahaya langsung ke lensa"

  occlusion:
    near_black_value: 15
    threshold: 0.85
    reject_reason: "Lensa kamera tertutup atau terhalang, bersihkan lensa dan coba lagi"

rule_engine:
  pole:
    confidence:
      min_score: 0.80
      reject_reason: "Objek tiang (pole) tidak terdeteksi dengan jelas"

    tilt:
      max_degrees: 5.0
      reject_reason: "Tiang miring melebihi batas ({value}°), batas maksimal 5°"

    frame_coverage:
      min_coverage: 0.012
      reject_reason: "Area tiang terlalu kecil dalam frame, mundur dan ambil gambar keseluruhan tiang"

    foundation_visibility:
      required: true
      reject_reason: "Fondasi tiang (pole_base) tidak terlihat, turunkan sudut kamera"

  odp_box:
    confidence:
      min_score: 0.70
      reject_reason: "Objek ODP (odp_box) tidak terdeteksi dengan jelas"

    tilt:
      max_degrees: 8.0
      reject_reason: "ODP miring melebihi batas ({value}°), batas maksimal 8°"

    frame_coverage:
      min_coverage: 0.005
      reject_reason: "ODP terlalu kecil dalam frame, ambil gambar dari jarak lebih dekat"

    identifier:
      required: true
      reject_reason: "Identitas ODP (odp_identifier) tidak terdeteksi"

    door_visible:
      required: false
      reject_reason: "Pintu ODP tidak terlihat di dalam frame"

    cable:
      required: true
      reject_reason: "Kabel ODP (odp_cable) tidak terdeteksi"
      
    cable_length:
      min_required: 5
      reject_reason: "Kabel terpasang kurang dari batas minimum (butuh minimal 5)"

  pole_and_odp_box:
    both_detected:
      reject_reason: "Gambar harus memiliki kedua objek, baik tiang maupun ODP Box. Objek {detected_object} belum terdeteksi dengan jelas."
    
    confidence:
      min_score_each: 0.65
      reject_reason: "Confidence score untuk {missing_object} belum memenuhi standar minimum (minimal 65%)"

    pole_tilt:
      max_degrees: 5.0
      reject_reason: "Tiang tampak terlalu miring ({value}°). Pastikan tiang berdiri tegak dan kamera sejajar"

    odp_box_tilt:
      max_degrees: 8.0
      reject_reason: "ODP Box tampak miring ({value}°). Pastikan terpasang rata pada tiang"

    frame_coverage:
      min_coverage: 0.015
      reject_reason: "Tiang dan ODP terlalu jauh/kecil. Silakan ambil gambar lebih dekat"

    odp_position:
      min_position: 0.10
      max_position: 0.80
      reject_reason: "Posisi ODP tidak ideal (terlalu tinggi atau terlalu rendah dari jangkauan yang terlihat pada tiang)"

    foundation_visibility:
      required: true
      reject_reason: "Fondasi tiang (pole_base) tidak terlihat, turunkan sudut kamera"

    location_description:
      required: true
      reject_reason: "Deskripsi lokasi (loc_desc) tidak ditemukan pada gambar"