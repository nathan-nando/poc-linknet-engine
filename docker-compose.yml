services:
  db:
    image: postgres:15
    container_name: linknet-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: linknet
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d linknet"]
      interval: 10s
      timeout: 5s
      retries: 5

  engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linknet-engine
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/linknet
    restart: unless-stopped

volumes:
  postgres_data:
